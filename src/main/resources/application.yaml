spring:
  application:
    name: gachireel

  datasource:
    url: jdbc:postgresql://aws-1-ap-northeast-2.pooler.supabase.com:5432/postgres?sslmode=require
    username: postgres.pdclnjcicvtdjniksdpu
    password: ${DB_PASSWORD}

  sql:
    init:
      mode: always

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: true
    open-in-view: false
    defer-datasource-initialization: true

server:
  port: 8080

constants:
  jwt:
    issuer: gachireel
    bearer-format: JWT
    claim-key: user
    secret-key: ${JWT_SECRET}
    access-token-cookie-name: gat
    access-token-cookie-path: /
    access-token-cookie-validity-seconds: 1800        # 30분
    access-token-validity-milliseconds: 1800000       # 30분
    refresh-token-cookie-name: grt
    refresh-token-cookie-path: /api/auth
    refresh-token-cookie-validity-seconds: 1209600    # 14일
    refresh-token-validity-milliseconds: 1209600000   # 14일
